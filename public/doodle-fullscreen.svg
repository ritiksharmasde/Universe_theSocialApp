<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" style="position:fixed;top:0;left:0;width:100vw;height:100vh;">
  <defs>
    <pattern id="doodle" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <!-- background -->
      <rect width="32" height="32" fill="white"/>

      <!-- zigzag black -->
      <polyline points="0,6 2,3 4,6 6,3 8,6" fill="none" stroke="#111" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- triangle black -->
      <polygon points="22,5 25.5,0 29,5" fill="none" stroke="#111" stroke-width="0.9" stroke-linejoin="round"/>

      <!-- sleep mask black -->
      <path d="M12,18 C13,15.5 17,15.5 18,18 C17,20.5 13,20.5 12,18Z" fill="none" stroke="#111" stroke-width="0.9"/>

      <!-- squiggle black -->
      <path d="M0,23 C1.5,20.5 3,25.5 4.5,23 C6,20.5 7.5,25.5 9,23" fill="none" stroke="#111" stroke-width="0.9" stroke-linecap="round"/>

      <!-- dots black -->
      <circle cx="20" cy="26" r="1.2" fill="#111"/>
      <circle cx="10" cy="10" r="1.2" fill="#111"/>

      <!-- dot cluster -->
      <circle cx="27" cy="20" r="0.9" fill="#111"/>
      <circle cx="29.2" cy="18.5" r="0.9" fill="#111"/>
      <circle cx="31.2" cy="20" r="0.9" fill="#111"/>

      <!-- dash black -->
      <line x1="14" y1="8" x2="19" y2="8" stroke="#111" stroke-width="0.9" stroke-linecap="round"/>

      <!-- spiral salmon -->
      <path d="M3,14 C4,11.5 7,11.5 7.5,13.5 C8,15.5 6,17 4.5,16 C3,15 3.5,12.5 5.5,12.2" fill="none" stroke="#F4907A" stroke-width="0.9" stroke-linecap="round"/>

      <!-- wavy salmon -->
      <path d="M20,13 C21.5,10.5 23,15.5 24.5,13 C26,10.5 27.5,15.5 29,13" fill="none" stroke="#F4907A" stroke-width="0.9" stroke-linecap="round"/>

      <!-- diamond blue -->
      <rect x="26" y="27" width="7" height="7" rx="0.5" fill="#A8D4F0" transform="rotate(45 29.5 30.5)"/>

      <!-- square yellow -->
      <rect x="14" y="24" width="7" height="7" rx="0.5" fill="none" stroke="#F5CC5A" stroke-width="0.9"/>

      <!-- dash yellow -->
      <line x1="0" y1="30" x2="6" y2="30" stroke="#F5CC5A" stroke-width="0.9" stroke-linecap="round"/>

      <!-- wavy yellow -->
      <path d="M22,30 C23,28 24.5,32 26,30" fill="none" stroke="#F5CC5A" stroke-width="0.9" stroke-linecap="round"/>

      <!-- arch green -->
      <path d="M8,32 A4,4 0 0,1 16,32" fill="none" stroke="#6DC87A" stroke-width="0.9" stroke-linecap="round"/>

      <!-- wavy green -->
      <path d="M0,16 C1.5,13.5 3,18.5 4.5,16" fill="none" stroke="#6DC87A" stroke-width="0.9" stroke-linecap="round"/>

      <!-- oval green -->
      <ellipse cx="25" cy="9" rx="2.5" ry="4.5" fill="none" stroke="#6DC87A" stroke-width="0.9"/>

      <!-- wavy blue -->
      <path d="M10,28 C11.5,25.5 13,30.5 14,28" fill="none" stroke="#A8D4F0" stroke-width="0.9" stroke-linecap="round"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="url(#doodle)"/>
</svg>
